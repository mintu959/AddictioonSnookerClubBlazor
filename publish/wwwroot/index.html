<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Addictioon Snooker Club – Nagpur's Premier Snooker Destination. Book tables, join tournaments, and manage your membership online." />
    <meta name="theme-color" content="#0A0A0F" />

    <title>Addictioon Snooker Club</title>

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎱</text></svg>" />

    <!-- App CSS -->
    <link rel="stylesheet" href="css/app.css" />

    <!-- Blazor WASM base -->
    <base href="/" />
</head>
<body>
    <div id="app">
        <!-- Loading screen shown while Blazor WASM downloads -->
        <div style="
            min-height:100vh; background:#0A0A0F;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center; gap:1.5rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        ">
            <div style="font-size:4rem; animation: spin 2s linear infinite;">🎱</div>
            <div style="color:#C9A84C; font-weight:700; letter-spacing:.3em; font-size:13px; text-transform:uppercase;">
                Loading Addictioon...
            </div>
            <div style="width:200px; height:3px; background:#141420; border-radius:2px; overflow:hidden;">
                <div style="height:100%; background:linear-gradient(90deg,#2ECC71,#C9A84C); border-radius:2px; animation:loadBar 1.5s ease-in-out infinite;"></div>
            </div>
        </div>
        <style>
            @keyframes spin    { to { transform: rotate(360deg); } }
            @keyframes loadBar { 0%{width:0%} 50%{width:80%} 100%{width:100%} }
        </style>
    </div>

    <div id="blazor-error-ui" style="
        display:none; position:fixed; bottom:0; left:0; right:0;
        background:#E74C3C; color:#fff; padding:1rem 2rem;
        text-align:center; z-index:9999; font-size:14px;
    ">
        An error has occurred. <a href="" style="color:#fff; font-weight:700;">Reload</a>
        <button onclick="document.getElementById('blazor-error-ui').style.display='none'"
                style="float:right; background:none; border:none; color:#fff; font-size:18px; cursor:pointer;">✕</button>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
